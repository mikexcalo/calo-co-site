<!DOCTYPE html><html lang='en' data-theme='dark'><head><meta charset='utf-8'/>
<meta name='viewport' content='width=device-width, initial-scale=1'/>
<title>Helix — CALO&CO editor</title>
<link href='https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap' rel='stylesheet'>
<style>
[data-theme=dark]{--bg:#0f0f10;--panel:#161617;--line:#2a2a2c;--ink:#e8e6e1;--mut:#8c8a85;--canvas:#08080a;--inputbg:#1c1c1d;--btn:#1c1c1d;}
[data-theme=light]{--bg:#edebe7;--panel:#ffffff;--line:#e4e2dd;--ink:#1c1c1c;--mut:#8c8a85;--canvas:#e6e4df;--inputbg:#f4f3ef;--btn:#f4f3ef;}
:root{--acc:#00DCA8;--accInk:#06231c;--G:'Geist';}
*{box-sizing:border-box}html,body{margin:0;height:100%}
body{background:var(--bg);font-family:var(--G),system-ui,sans-serif;color:var(--ink);display:flex;flex-direction:column;height:100vh;overflow:hidden;transition:background .2s,color .2s;}
.bar{height:54px;flex:none;display:flex;align-items:center;gap:12px;padding:0 14px;background:var(--panel);border-bottom:1px solid var(--line);}
.brand{font-family:var(--G);font-weight:700;font-size:15px;letter-spacing:.02em;color:var(--acc);}
.brand small{color:var(--mut);font-size:10px;margin-left:5px;font-weight:500;}
.seg{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
.seg button{font-family:var(--G);font-weight:500;font-size:12px;background:var(--btn);color:var(--ink);border:0;padding:7px 12px;cursor:pointer;border-right:1px solid var(--line);}
.seg button:last-child{border-right:0}.seg button.on{background:var(--acc);color:var(--accInk);}
.bar .sp{flex:1}
.tbtn{font-family:var(--G);font-weight:500;font-size:12px;background:var(--btn);color:var(--ink);border:1px solid var(--line);border-radius:7px;padding:7px 11px;cursor:pointer;}
.tbtn:hover{border-color:var(--acc)}.tbtn.on{background:var(--acc);color:var(--accInk);border-color:var(--acc);}.tbtn:disabled{opacity:.4;cursor:default}
.main{flex:1;display:flex;min-height:0;}
.canvas{flex:1;background:var(--canvas);display:flex;justify-content:center;align-items:flex-start;padding:22px;overflow:auto;transition:background .2s;}
.frameWrap{position:relative;background:#fff;box-shadow:0 24px 60px -20px rgba(0,0,0,.55);transition:width .2s ease;}
iframe{display:block;border:0;width:100%;height:100%;}
.dock{width:288px;flex:none;background:var(--panel);border-left:1px solid var(--line);overflow:auto;padding:14px;}
.grp{margin:16px 0 4px;font-family:var(--G);font-weight:600;font-size:11px;letter-spacing:.02em;color:var(--ink);border-top:1px solid var(--line);padding-top:13px;}
.grp:first-child{border-top:0;margin-top:0}
.row label{display:block;font-family:var(--G);font-weight:500;font-size:11px;color:var(--mut);margin:12px 0 4px;}
.row .v{color:var(--acc);font-weight:600;}
.row input[type=range]{width:100%;accent-color:var(--acc);}
.row input[type=text]{width:100%;background:var(--inputbg);border:1px solid var(--line);color:var(--ink);border-radius:6px;padding:8px 9px;font-family:var(--G);font-size:13px;}
.row .tog{display:flex;align-items:center;gap:8px;margin-top:11px;}.row .tog input{accent-color:var(--acc);width:15px;height:15px;}.row .tog span{font-size:13px;color:var(--ink);}
.row .clr{display:flex;align-items:center;gap:8px;margin-top:4px;}
.row .clr input[type=color]{width:32px;height:32px;border:1px solid var(--line);border-radius:7px;background:none;padding:0;cursor:pointer;}
.row .clr code{font-family:var(--G);font-size:12px;color:var(--mut);}
.note{margin-top:18px;font-size:11.5px;color:var(--mut);line-height:1.5;border-top:1px solid var(--line);padding-top:13px;}
.copy{margin-top:13px;width:100%;font-family:var(--G);font-size:13px;font-weight:600;border:0;background:var(--acc);color:var(--accInk);padding:11px;border-radius:8px;cursor:pointer;}
</style></head><body>

  <span class='brand'>Helix<small>v2.2</small></span>

  </div>
  <button class='tbtn' id='bGuide'>Center line</button>

  <span class='sp'></span>
  <button class='tbtn' id='bTheme'>☀ Light</button>
  <button class='tbtn' id='bUndo' disabled>↶</button>
  <button class='tbtn' id='bRedo' disabled>↷</button>
  <button class='tbtn' id='bReplay'>Replay motion</button>

  </div></div>
  <div class='dock' id='dock'></div>
</div>

<style>

*{box-sizing:border-box}html,body{margin:0}body{background:var(--ivory);font-family:var(--G),system-ui,sans-serif;color:var(--charcoal);-webkit-font-smoothing:antialiased;}

.sh{background:var(--ivory);padding:var(--shTop) var(--site-gutter) var(--shBot);}

.shSub{font-family:var(--G),sans-serif;font-size:17px;line-height:1.6;color:#6b6b6f;max-width:46ch;margin:18px 0 0;}

.shFine{margin-top:16px;font-family:var(--M),monospace;font-weight:500;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#9a9893;}
.module{height:300vh;position:relative;background:var(--ivory);}
.sticky{position:sticky;top:0;height:100vh;display:flex;align-items:center;}
.panel{position:relative;margin:0 auto;overflow:hidden;width:calc(var(--site-max-width) + var(--p,0)*(100vw - var(--site-max-width)));height:calc(64vh + var(--p,0)*28vh);border-radius:calc((1 - var(--p,0))*16px);}
.panel img{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100%;min-width:100vw;height:auto;min-height:100%;object-fit:cover;}
.scrimL{position:absolute;inset:0;background:radial-gradient(75% 88% at 72% 52%,transparent 0%,transparent 26%,rgba(0,0,0,.55) 55%,rgba(0,0,0,.86) 100%);}
.scrimBR{position:absolute;inset:0;background:linear-gradient(90deg,rgba(0,0,0,.6) 0%,rgba(0,0,0,.2) 38%,transparent 58%);}
.qzone{position:absolute;left:0;top:0;bottom:0;width:min(620px,54%);z-index:3;display:flex;flex-direction:column;justify-content:center;padding:0 clamp(28px,5vw,80px);}
.qText{font-family:var(--L),Georgia,serif;font-size:clamp(1.6rem,2.5vw,2.7rem);line-height:1.26;letter-spacing:-.02em;color:#F5F5F5;text-align:left;margin:0;}
.qText em{font-style:italic;}.ln{display:block;}
.qSig{font-family:'Sacramento',cursive;font-size:clamp(1.5rem,2.6vw,2.25rem);color:#F5F5F5;margin-top:30px;text-align:left;}
.qRole{font-family:var(--M),monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:rgba(245,245,245,.55);margin-top:12px;text-align:left;}
.qBtn{display:inline-flex;align-items:center;gap:8px;margin-top:26px;font-family:var(--G),sans-serif;font-weight:500;font-size:15px;background:#F5F5F5;color:#111113;padding:15px 26px;border-radius:6px;text-decoration:none;width:fit-content;}
.fi{opacity:0;transform:translateY(24px);}
.panel[data-revealed='true'] .fi{opacity:1;transform:translateY(0);transition:opacity 1.1s cubic-bezier(.16,1,.3,1),transform 1.1s cubic-bezier(.16,1,.3,1);}
.panel[data-revealed='true'] .fi[data-fi='2']{transition-delay:.18s;}.panel[data-revealed='true'] .fi[data-fi='3']{transition-delay:.36s;}.panel[data-revealed='true'] .fi[data-fi='4']{transition-delay:.54s;}
.tail{height:60vh;background:var(--ivory);}
body.hx-bounds .shInner{outline:1px dashed rgba(0,220,168,.75);}
body.hx-bounds .sh,body.hx-bounds .module{box-shadow:inset 0 0 0 1px rgba(0,220,168,.4);}
.hx-sel{outline:2px solid #00DCA8!important;outline-offset:-2px;}
</style></head><body>

var module=document.getElementById('module'),panel=document.getElementById('panel'),OFF=16,revealed=false;
function clamp(v,a,b){return Math.min(b,Math.max(a,v));}function ease(t){return t<=0?0:t>=1?1:1-Math.pow(1-t,3);}function seg(p,a,b){return ease(clamp((p-a)/(b-a),0,1));}
function tick(){var r=module.getBoundingClientRect(),tot=module.offsetHeight-window.innerHeight;var p=tot>0?clamp(-r.top/tot,0,1):0;var op=seg(p,0,.3);var ex=tot>0?clamp((-r.top-tot)/window.innerHeight,0,1):0;var pv=op*(1-ease(ex));panel.style.setProperty('--p',pv.toFixed(4));panel.style.transform='translateY('+((1-pv)*(-OFF)).toFixed(2)+'vh)';if(!revealed&&p>=.3){revealed=true;panel.setAttribute('data-revealed','true');}if(revealed&&p<.05){revealed=false;panel.removeAttribute('data-revealed');}}
window.addEventListener('scroll',tick,{passive:true});window.addEventListener('resize',tick);
window.helixSetOffset=function(v){OFF=v;tick();};window.helixReplay=function(){revealed=false;panel.removeAttribute('data-revealed');window.scrollTo(0,0);};
tick();

var stage=document.getElementById('stage'); stage.srcdoc=STAGE_DOC;
var frameWrap=document.getElementById('frameWrap'), dock=document.getElementById('dock');
function fdoc(){return stage.contentDocument;} function fwin(){return stage.contentWindow;}
var HELIX=[
 {group:'Tokens'},
 {id:'ivory',type:'color',label:'Ivory surface',cssVar:'--ivory',value:'#F5F5F5'},
 {id:'charcoal',type:'color',label:'Charcoal',cssVar:'--charcoal',value:'#1A1A1A'},
 {id:'reef',type:'color',label:'Reef accent',cssVar:'--reef',value:'#00DCA8'},
 {group:'Start Here'},
 {id:'shTop',type:'range',label:'Top padding',cssVar:'--shTop',min:48,max:520,step:4,value:120,unit:'px'},
 {id:'shBot',type:'range',label:'Bottom padding',cssVar:'--shBot',min:48,max:520,step:4,value:120,unit:'px'},
 {id:'shHead',type:'text',label:'Headline',sel:'.shHeadline',value:'Wherever you are on your journey'},
 {id:'shCta',type:'text',label:'CTA label',sel:'.shCta',value:'Book discovery call'},
 {id:'shFineText',type:'text',label:'Sub-line',sel:'#fine',value:'No cost, no commitment'},
 {id:'subline',type:'toggle',label:'Show sub-line',sel:'#fine',value:true},
 {group:'Stevie module'},
 {id:'restOff',type:'range',label:'Card rest offset',min:0,max:26,step:1,value:16,unit:'vh',special:'offset'},
];
var defaults={}; HELIX.forEach(function(c){if(c.id)defaults[c.id]=c.value;});
var state=Object.assign({},defaults);
var hist=[], hi=-1, snapT=0;
function applyOne(c){var d=fdoc();if(!d)return;var v=state[c.id];
 if(c.type==='range'||c.type==='color'){if(c.cssVar)d.documentElement.style.setProperty(c.cssVar,v+(c.unit||''));if(c.special==='offset'&&fwin().helixSetOffset)fwin().helixSetOffset(parseFloat(v));}
 else if(c.special==='offset'){if(fwin().helixSetOffset)fwin().helixSetOffset(parseFloat(v));}
 else if(c.type==='text'){var el=d.querySelector(c.sel);if(el)el.textContent=v;}
 else if(c.type==='toggle'){var e2=d.querySelector(c.sel);if(e2)e2.style.display=v?'':'none';}}
function applyAll(){HELIX.forEach(function(c){if(c.id)applyOne(c);});}
function snapshot(){hist=hist.slice(0,hi+1);hist.push(JSON.stringify(state));hi=hist.length-1;updNav();}
function dsnap(){clearTimeout(snapT);snapT=setTimeout(snapshot,260);}
function updNav(){document.getElementById('bUndo').disabled=hi<=0;document.getElementById('bRedo').disabled=hi>=hist.length-1;}
function loadState(s,push){state=Object.assign({},s);syncInputs();applyAll();if(push)snapshot();}
function build(){
 HELIX.forEach(function(c){
  if(c.group){var g=document.createElement('div');g.className='grp';g.textContent=c.group;dock.appendChild(g);return;}
  var row=document.createElement('div');row.className='row';
  if(c.type==='range'){row.innerHTML='<label>'+c.label+' · <span class="v" id="o_'+c.id+'">'+c.value+'</span>'+(c.unit||'')+'</label>';
   var i=document.createElement('input');i.type='range';i.min=c.min;i.max=c.max;i.step=c.step;i.value=c.value;i.dataset.id=c.id;
   i.addEventListener('input',function(){state[c.id]=i.value;document.getElementById('o_'+c.id).textContent=i.value;applyOne(c);dsnap();});row.appendChild(i);
  }else if(c.type==='color'){row.innerHTML='<label>'+c.label+'</label>';var w=document.createElement('div');w.className='clr';
   var ci=document.createElement('input');ci.type='color';ci.value=c.value;ci.dataset.id=c.id;var code=document.createElement('code');code.textContent=c.value;
   ci.addEventListener('input',function(){state[c.id]=ci.value;code.textContent=ci.value;applyOne(c);dsnap();});w.appendChild(ci);w.appendChild(code);row.appendChild(w);
  }else if(c.type==='text'){row.innerHTML='<label>'+c.label+'</label>';var t=document.createElement('input');t.type='text';t.value=c.value;t.dataset.id=c.id;
   t.addEventListener('input',function(){state[c.id]=t.value;applyOne(c);dsnap();});row.appendChild(t);
  }else if(c.type==='toggle'){var tg=document.createElement('div');tg.className='tog';var cb=document.createElement('input');cb.type='checkbox';cb.checked=!!c.value;cb.dataset.id=c.id;
   var sp=document.createElement('span');sp.textContent=c.label;cb.addEventListener('change',function(){state[c.id]=cb.checked;applyOne(c);snapshot();});tg.appendChild(cb);tg.appendChild(sp);row.appendChild(tg);}
  dock.appendChild(row);
 });
 var note=document.createElement('div');note.className='note';note.textContent='Dial it in, then Export (or Copy) and hand me the values — I write the production brief from those exact numbers.';dock.appendChild(note);
 var copy=document.createElement('button');copy.className='copy';copy.textContent='Copy values for brief';
 copy.addEventListener('click',function(){var lines=HELIX.filter(function(c){return c.id;}).map(function(c){return c.label+': '+state[c.id]+(c.unit||'');});
  navigator.clipboard.writeText(lines.join('\n')).then(function(){copy.textContent='Copied!';setTimeout(function(){copy.textContent='Copy values for brief';},1200);});});
 dock.appendChild(copy);
}
function syncInputs(){dock.querySelectorAll('input').forEach(function(i){var id=i.dataset.id;if(!id||!(id in state))return;if(i.type==='checkbox')i.checked=!!state[id];else i.value=state[id];var o=document.getElementById('o_'+id);if(o)o.textContent=state[id];var sib=i.parentNode.querySelector('code');if(sib&&i.type==='color')sib.textContent=state[id];});}
document.getElementById('devSeg').addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;[].forEach.call(this.children,function(x){x.classList.remove('on');});b.classList.add('on');frameWrap.style.width=b.dataset.w;});
document.getElementById('bGuide').addEventListener('click',function(){this.classList.toggle('on');document.getElementById('guideLine').style.display=this.classList.contains('on')?'block':'none';});

document.getElementById('bTheme').addEventListener('click',function(){var h=document.documentElement;var dk=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',dk?'light':'dark');this.textContent=dk?'\u263e Dark':'\u2600 Light';});
